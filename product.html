<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product — Juice Bunny Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
:root{
  --pink:#FF2D78; --pink2:#e0206a; --pink-glow:rgba(255,45,120,.35);
  --bg:#0d0d12; --bg2:#12121a; --bg3:#1a1a24;
  --text:#fff; --text2:#a0a0b0; --text3:#606070;
  --border:rgba(255,255,255,.08); --success:#2ecc71; --error:#ff4444; --gold:#ffb020;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}

.nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:26px;
  padding:14px 28px;background:rgba(13,13,18,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Dancing Script',cursive;font-size:24px;font-weight:700}
.nav-logo img{height:34px}
.nav-links{display:flex;gap:22px;font-size:14px;color:var(--text2);margin-left:8px}
.nav-links a:hover{color:var(--text)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.cart-btn{position:relative;background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:9px 18px;border-radius:20px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;transition:.2s}
.cart-btn:hover{border-color:var(--pink)}
.cart-count{background:var(--pink);color:#fff;font-size:11px;font-weight:700;min-width:19px;height:19px;
  border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}

.crumb{max-width:1100px;margin:0 auto;padding:20px 24px 0;font-size:13px;color:var(--text2)}
.crumb a:hover{color:var(--pink)}

.detail{max-width:1100px;margin:0 auto;padding:20px 24px 90px;
  display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:start}

/* Gallery */
.gallery-main{aspect-ratio:1;border-radius:22px;overflow:hidden;background:linear-gradient(135deg,#1a1020,#241428);
  display:flex;align-items:center;justify-content:center;font-size:120px;border:1px solid var(--border)}
.gallery-main img{width:100%;height:100%;object-fit:cover}
.gallery-thumbs{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.gthumb{width:72px;height:72px;border-radius:13px;overflow:hidden;background:linear-gradient(135deg,#1a1020,#241428);
  display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;
  border:2px solid transparent;transition:.18s}
.gthumb img{width:100%;height:100%;object-fit:cover}
.gthumb.active{border-color:var(--pink)}
.gthumb:hover{border-color:rgba(255,45,120,.5)}

/* Info column */
.p-cat{font-size:11px;letter-spacing:1.8px;font-weight:700;color:var(--pink);text-transform:uppercase}
.p-name{font-family:'Dancing Script',cursive;font-weight:700;font-size:clamp(34px,4.4vw,50px);line-height:1.08;margin:10px 0 6px}
.p-price-row{display:flex;align-items:baseline;gap:14px;margin:14px 0 4px}
.p-price{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:1px}
.p-price small{font-size:24px;color:var(--text2)}
.p-was{font-size:20px;color:var(--text3);text-decoration:line-through}
.p-save{background:rgba(46,204,113,.14);color:var(--success);font-size:12px;font-weight:700;
  padding:5px 11px;border-radius:11px;letter-spacing:.5px}
.p-desc{color:var(--text2);font-size:15px;line-height:1.7;margin:20px 0}
.p-stock{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;margin-bottom:22px}
.stock-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.in-stock{color:var(--success)} .in-stock .stock-dot{background:var(--success);box-shadow:0 0 8px rgba(46,204,113,.7)}
.low-stock{color:var(--gold)} .low-stock .stock-dot{background:var(--gold);box-shadow:0 0 8px rgba(255,176,32,.7)}
.out-stock{color:var(--error)} .out-stock .stock-dot{background:var(--error)}

.buy-row{display:flex;gap:14px;align-items:center;margin-bottom:22px;flex-wrap:wrap}
.qty-ctl{display:flex;align-items:center;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.qty-ctl button{width:44px;height:48px;background:none;color:var(--text);font-size:20px}
.qty-ctl button:hover{background:var(--bg3)}
.qty-ctl span{min-width:40px;text-align:center;font-size:16px;font-weight:600}
.btn-add-lg{flex:1;min-width:200px;background:var(--pink);color:#fff;height:48px;border-radius:14px;
  font-size:15px;font-weight:700;transition:.2s}
.btn-add-lg:hover{background:var(--pink2);box-shadow:0 0 20px var(--pink-glow)}
.btn-add-lg:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;box-shadow:none}

.trust{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.trust-item{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:13px 15px;font-size:12.5px;color:var(--text2)}
.trust-item b{display:block;color:var(--text);font-size:13px;margin-bottom:2px}

.loading, .notfound{max-width:1100px;margin:0 auto;padding:80px 24px;text-align:center;color:var(--text2)}
.notfound a{color:var(--pink);font-weight:600}

/* Cart drawer (shared behaviour with store) */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;opacity:0;pointer-events:none;transition:.25s}
.cart-overlay.open{opacity:1;pointer-events:auto}
.cart-drawer{position:fixed;top:0;right:-420px;width:min(400px,92vw);height:100vh;z-index:401;
  background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:right .28s ease}
.cart-drawer.open{right:0}
.cart-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--border)}
.cart-head h3{font-family:'Dancing Script',cursive;font-weight:700;font-size:26px}
.cart-close{background:none;color:var(--text2);font-size:22px}
.cart-items{flex:1;overflow-y:auto;padding:14px 22px;display:flex;flex-direction:column;gap:14px}
.cart-item{display:flex;gap:12px;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:10px 12px}
.ci-thumb{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(135deg,#1a1020,#241428);flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:12px;color:var(--text2);margin-top:2px}
.ci-qty{display:flex;align-items:center;gap:8px}
.ci-qty button{width:24px;height:24px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:14px}
.ci-qty span{font-size:13px;font-weight:600;min-width:16px;text-align:center}
.cart-empty{text-align:center;color:var(--text2);font-size:13.5px;padding:40px 12px}
.cart-foot{border-top:1px solid var(--border);padding:18px 22px;display:flex;flex-direction:column;gap:12px}
.cart-total-row{display:flex;justify-content:space-between;font-size:14px;color:var(--text2)}
.cart-total-row.big{font-size:16px;color:var(--text);font-weight:700}
.cart-total-row.big span:last-child{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px}
.btn-checkout{background:var(--pink);color:#fff;padding:14px;border-radius:16px;font-size:15px;font-weight:700;transition:.2s}
.btn-checkout:hover{background:var(--pink2);box-shadow:0 0 18px var(--pink-glow)}
.cart-note{font-size:11px;color:var(--text3);text-align:center;line-height:1.5}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg3);border:1px solid rgba(255,45,120,.45);color:var(--text);
  padding:12px 22px;border-radius:14px;font-size:13.5px;font-weight:500;z-index:600;
  opacity:0;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.5);max-width:92vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:820px){
  .detail{grid-template-columns:1fr;gap:26px}
}
@media(max-width:640px){
  .nav{gap:14px;padding:12px 16px}.nav-links{display:none}
  .gallery-main{font-size:88px}
}
@media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="index.html"><img src="white-rabbit-logo.png" alt=""/> Juice Bunny</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="store.html">Store</a>
    <a href="chat.html">Chat</a>
    <a href="model-apply.html">Become a Model</a>
  </div>
  <div class="nav-right">
    <button class="cart-btn" onclick="toggleCart(true)">🛒 Cart <span class="cart-count" id="cartCount">0</span></button>
  </div>
</nav>

<div class="crumb"><a href="store.html">← Store</a> <span id="crumbCat"></span></div>

<main id="detail"><div class="loading">Loading product…</div></main>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart(false)"></div>
<aside class="cart-drawer" id="cartDrawer">
  <div class="cart-head"><h3>Your Cart</h3><button class="cart-close" onclick="toggleCart(false)">✕</button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="cart-total-row"><span>Items</span><span id="cartItemsCount">0</span></div>
    <div class="cart-total-row big"><span>Total</span><span id="cartTotal">$0.00</span></div>
    <button class="btn-checkout" onclick="checkout()">Checkout</button>
    <div class="cart-note">Checkout opens with card &amp; crypto payments at launch.</div>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ewhhufhnfrhherjmbvqq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3aGh1ZmhuZnJoaGVyam1idnFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjA3NjYsImV4cCI6MjA5NzI5Njc2Nn0.F2Jso5b9G2M67kW1Ty5oGGgH9wYqH0rcI1c3iToByhM';
let sb = null, product = null, qty = 1;
let cart = [];
try { cart = JSON.parse(localStorage.getItem('jb_cart') || '[]'); } catch(e){ cart = []; }

const id = new URLSearchParams(location.search).get('id');

renderCart();
const s = document.createElement('script');
s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
s.onload = async () => { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); await loadProduct(); };
document.head.appendChild(s);

function esc(str){ return String(str==null?'':str).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadProduct() {
  if (!id) { showNotFound(); return; }
  try {
    const { data } = await sb.from('products').select('*').eq('id', id).eq('is_active', true).maybeSingle();
    if (!data) { showNotFound(); return; }
    product = data;
    renderDetail();
  } catch(e) { showNotFound(); }
}

function showNotFound() {
  document.getElementById('detail').innerHTML =
    '<div class="notfound"><p>Product not found.</p><p style="margin-top:10px"><a href="store.html">← Back to the store</a></p></div>';
}

function renderDetail() {
  const p = product;
  const imgs = (p.images && p.images.length) ? p.images : [];
  const hasImgs = imgs.length > 0;
  const emoji = p.emoji || '🛍️';
  const stock = Number(p.stock_units || 0);
  const onSale = p.sale_price != null && Number(p.sale_price) < Number(p.price_usd);
  const now = onSale ? Number(p.sale_price) : Number(p.price_usd);
  const pct = onSale ? Math.round((1 - now/Number(p.price_usd)) * 100) : 0;

  let stockCls = 'in-stock', stockTxt = 'In stock';
  if (stock <= 0) { stockCls = 'out-stock'; stockTxt = 'Out of stock'; }
  else if (stock <= 15) { stockCls = 'low-stock'; stockTxt = 'Only ' + stock + ' left in stock'; }
  else { stockTxt = stock + ' in stock'; }

  document.getElementById('crumbCat').textContent = '/ ' + (p.category || '');
  document.title = p.name + ' — Juice Bunny Store';

  const mainMedia = hasImgs ? `<img id="galleryMain" src="${esc(imgs[0])}" alt="${esc(p.name)}"/>` : `<span id="galleryMain">${emoji}</span>`;
  const thumbs = hasImgs ? imgs.map((u,i) =>
    `<div class="gthumb ${i===0?'active':''}" onclick="setMain(${i})"><img src="${esc(u)}" alt=""/></div>`).join('') : '';

  document.getElementById('detail').innerHTML = `
  <div class="detail">
    <div>
      <div class="gallery-main">${mainMedia}</div>
      ${hasImgs && imgs.length > 1 ? `<div class="gallery-thumbs">${thumbs}</div>` : ''}
    </div>
    <div>
      <div class="p-cat">${esc(p.category)}</div>
      <h1 class="p-name">${esc(p.name)}</h1>
      <div class="p-price-row">
        <div class="p-price"><small>$</small>${now.toFixed(2)}</div>
        ${onSale ? `<span class="p-was">$${Number(p.price_usd).toFixed(2)}</span><span class="p-save">SAVE ${pct}%</span>` : ''}
      </div>
      <p class="p-desc">${esc(p.description || '')}</p>
      <div class="p-stock ${stockCls}"><span class="stock-dot"></span> ${stockTxt}</div>
      <div class="buy-row">
        <div class="qty-ctl">
          <button onclick="stepQty(-1)" aria-label="Decrease">−</button>
          <span id="qtyVal">1</span>
          <button onclick="stepQty(1)" aria-label="Increase">+</button>
        </div>
        <button class="btn-add-lg" id="addBtn" onclick="addToCart()" ${stock<=0?'disabled':''}>
          ${stock<=0 ? 'Out of Stock' : 'Add to Cart'}
        </button>
      </div>
      <div class="trust">
        <div class="trust-item"><b>Discreet packaging</b>Plain box, no branding outside.</div>
        <div class="trust-item"><b>Card &amp; crypto</b>Secure checkout at launch.</div>
        <div class="trust-item"><b>18+ only</b>Age-restricted products.</div>
        <div class="trust-item"><b>Ships worldwide</b>Tracked delivery on every order.</div>
      </div>
    </div>
  </div>`;
}

function setMain(i) {
  const imgs = product.images || [];
  document.getElementById('galleryMain').src = imgs[i];
  document.querySelectorAll('.gthumb').forEach((t,idx) => t.classList.toggle('active', idx===i));
}

function stepQty(d) {
  const max = Number(product.stock_units || 0);
  qty = Math.max(1, Math.min(max || 99, qty + d));
  document.getElementById('qtyVal').textContent = qty;
}

/* ── CART ── */
function persistCart(){ localStorage.setItem('jb_cart', JSON.stringify(cart)); }
function addToCart() {
  if (!product || Number(product.stock_units||0) <= 0) return;
  const price = (product.sale_price != null && Number(product.sale_price) < Number(product.price_usd))
    ? Number(product.sale_price) : Number(product.price_usd);
  const line = cart.find(x => String(x.id) === String(product.id));
  if (line) line.qty += qty;
  else cart.push({ id: product.id, name: product.name, price, emoji: product.emoji || '🛍️', qty });
  persistCart(); renderCart(); toggleCart(true);
  showToast('✓ Added ' + qty + ' × ' + product.name.split('—')[0].trim());
}
function changeQty(id, d) {
  const line = cart.find(x => String(x.id) === String(id));
  if (!line) return;
  line.qty += d;
  if (line.qty <= 0) cart = cart.filter(x => String(x.id) !== String(id));
  persistCart(); renderCart();
}
function renderCart() {
  const count = cart.reduce((s,l)=>s+l.qty,0), total = cart.reduce((s,l)=>s+l.qty*l.price,0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartItemsCount').textContent = count;
  document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
  const box = document.getElementById('cartItems');
  if (!cart.length) { box.innerHTML = '<div class="cart-empty">Your cart is empty 🐰</div>'; return; }
  box.innerHTML = cart.map(l => `
    <div class="cart-item">
      <div class="ci-thumb">${l.emoji}</div>
      <div class="ci-info"><div class="ci-name">${esc(l.name)}</div><div class="ci-price">$${l.price.toFixed(2)} each</div></div>
      <div class="ci-qty">
        <button onclick="changeQty('${l.id}',-1)">−</button><span>${l.qty}</span><button onclick="changeQty('${l.id}',1)">+</button>
      </div>
    </div>`).join('');
}
function toggleCart(open){ document.getElementById('cartDrawer').classList.toggle('open',open); document.getElementById('cartOverlay').classList.toggle('open',open); }
function checkout(){ if(!cart.length){showToast('Your cart is empty 🐰');return;} showToast('🛒 Checkout opens at launch — card & crypto coming soon!'); }

let toastTimer=null;
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }
</script>
</body>
</html>
